<!DOCTYPE html>
<html>
<body style="margin: 0; overflow: hidden; height: 100vh; background-color: #f0f0f0;">

    <div id="ball" style="
        position: absolute; 
        left: 50%; top: 50%; 
        transform: translate(-50%, -50%); 
        width: 100px; height: 100px; 
        background-color: red; 
        border-radius: 50%;">
    </div>

    <script>
        const ball = document.getElementById('ball');
        let x = window.innerWidth / 2;
        let y = window.innerHeight / 2;
        const speed = 10; // 움직이는 속도

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowUp') y -= speed;
            if (event.key === 'ArrowDown') y += speed;
            if (event.key === 'ArrowLeft') x -= speed;
            if (event.key === 'ArrowRight') x += speed;

            // 공이 화면 밖으로 완전히 나가지 않게 제한
            x = Math.max(50, Math.min(window.innerWidth - 50, x));
            y = Math.max(50, Math.min(window.innerHeight - 50, y));

            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
            ball.style.transform = 'translate(-50%, -50%)';
        });
    </script>
    //공 방향키 조정
</body>
</html>
