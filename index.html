<!DOCTYPE html>
<html>
<body style="background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div id="gameContainer" style="position: relative;">
        <canvas id="gameCanvas" width="400" height="400" style="background:#90EE90; border: 2px solid white;"></canvas>
        
        <button id="startButton" style="
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            background-color: #4CAF50; color: white; border: none; border-radius: 5px;">
            시작하기 (Space)
        </button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startButton");

        let snake, dx, dy, food, isStarted = false, isGameOver = false;

        function initGame() {
            snake = [{x: 200, y: 200}, {x: 180, y: 200}, {x: 160, y: 200}];
            dx = 20; dy = 0;
            food = {x: 300, y: 200};
            isStarted = true;
            isGameOver = false;
            startBtn.style.display = 'none';
            drawGame();
        }

        startBtn.addEventListener('click', () => { if (!isStarted || isGameOver) initGame(); });
        canvas.addEventListener('click', () => { if (isGameOver) initGame(); });

        document.addEventListener('keydown', (e) => {
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
            if (e.code === 'Space' && (!isStarted || isGameOver)) initGame();
            
            if (isStarted && !isGameOver) {
                if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -20; }
                else if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = 20; }
                else if (e.key === 'ArrowLeft' && dx === 0) { dx = -20; dy = 0; }
                else if (e.key === 'ArrowRight' && dx === 0) { dx = 20; dy = 0; }
            }
        });

        function drawGame() {
            if (isGameOver) return;

            let head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // 1. 벽 충돌 체크
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                return gameOver();
            }

            // 2. 자기 몸 충돌 체크 (머리가 몸통 좌표 중 하나와 겹치는지 확인)
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return gameOver();
                }
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                // 먹이 먹으면 재생성 (지렁이 몸 안 겹치게 하는 로직은 생략하여 간결함 유지)
                food = {x: Math.floor(Math.random() * 20) * 20, y: Math.floor(Math.random() * 20) * 20};
            } else {
                snake.pop();
            }

            // 그리기
            ctx.fillStyle = "#90EE90";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, 18, 18);
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "blue" : "skyblue";
                ctx.fillRect(part.x, part.y, 18, 18);
            });

            setTimeout(drawGame, 100);
        }

        function gameOver() {
            isGameOver = true;
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 45px Arial";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
            ctx.font = "20px Arial";
            ctx.fillText("Press Space or Click to Restart", canvas.width / 2, canvas.height / 2 + 50);
        }
    </script>
</body>
</html>
