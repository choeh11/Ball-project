<!DOCTYPE html>
<html>
<body style="background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div id="gameContainer" style="position: relative;">
        <canvas id="gameCanvas" width="400" height="400" style="background:#90EE90; border: 2px solid white;"></canvas>
        
        <button id="startButton" style="
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            background-color: #4CAF50; color: white; border: none; border-radius: 5px;">
            시작하기 (Space)
        </button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startButton");

        let snake = [{x: 200, y: 200}, {x: 180, y: 200}, {x: 160, y: 200}];
        let dx = 20, dy = 0;
        let food = {x: 300, y: 200};
        let isStarted = false;

        function startGame() {
            isStarted = true;
            startBtn.style.display = 'none';
            drawGame();
        }

        startBtn.addEventListener('click', startGame);

document.addEventListener('keydown', (e) => {
    // 화살표 키나 스페이스바가 눌리면 스크롤 방지
    if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
    }

    // 게임 시작 (스페이스바)
    if (e.code === 'Space' && !isStarted) {
        startGame();
    }
    
    // 방향 전환 로직
    if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -20; }
    else if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = 20; }
    else if (e.key === 'ArrowLeft' && dx === 0) { dx = -20; dy = 0; }
    else if (e.key === 'ArrowRight' && dx === 0) { dx = 20; dy = 0; }
});

        function drawGame() {
            if (!isStarted) return;

            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                food = {x: Math.floor(Math.random() * 20) * 20, y: Math.floor(Math.random() * 20) * 20};
            } else {
                snake.pop();
            }

            // 배경 그리기 (연두색으로 채우기)
            ctx.fillStyle = "#90EE90";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 열매 그리기 (빨간색 유지)
            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, 18, 18);

            // 지렁이 그리기 (머리: 파랑, 몸: 하늘)
            snake.forEach((part, index) => {
                if (index === 0) {
                    ctx.fillStyle = "blue"; // 머리는 파랑
                } else {
                    ctx.fillStyle = "skyblue"; // 몸은 하늘
                }
                ctx.fillRect(part.x, part.y, 18, 18);
            });

            setTimeout(drawGame, 150);
        }
    </script>
</body>
</html>
