<!DOCTYPE html>
<html>
<body style="background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div id="gameContainer" style="position: relative;">
        <canvas id="gameCanvas" width="400" height="400" style="background:#90EE90; border: 2px solid white;"></canvas>
        
        <button id="startButton" style="
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            background-color: #4CAF50; color: white; border: none; border-radius: 5px;">
            시작하기 (Space)
        </button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startButton");

        let snake, dx, dy, food, isStarted, isGameOver;

        // 게임 초기화 함수 (처음 시작하거나 재시작할 때 호출)
        function initGame() {
            snake = [{x: 200, y: 200}, {x: 180, y: 200}, {x: 160, y: 200}];
            dx = 20;
            dy = 0;
            food = {x: 300, y: 200};
            isStarted = true;
            isGameOver = false;
            startBtn.style.display = 'none';
            drawGame();
        }

        startBtn.addEventListener('click', () => {
            if (!isStarted || isGameOver) initGame();
        });

        document.addEventListener('keydown', (e) => {
            // 스크롤 방지 (방향키, 스페이스바)
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();

            // 시작 또는 재시작 (스페이스바)
            if (e.code === 'Space') {
                if (!isStarted || isGameOver) initGame();
            }
            
            // 방향 전환 (게임 중일 때만)
            if (isStarted && !isGameOver) {
                if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -20; }
                else if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = 20; }
                else if (e.key === 'ArrowLeft' && dx === 0) { dx = -20; dy = 0; }
                else if (e.key === 'ArrowRight' && dx === 0) { dx = 20; dy = 0; }
            }
        });

        function drawGame() {
            if (isGameOver) return; // 게임 오버 상태면 더 이상 그리지 않음

            let head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // [벽 충돌 체크]
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                gameOver();
                return;
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                food = {x: Math.floor(Math.random() * 20) * 20, y: Math.floor(Math.random() * 20) * 20};
            } else {
                snake.pop();
            }

            // 배경 그리기
            ctx.fillStyle = "#90EE90";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 열매 그리기
            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, 18, 18);

            // 지렁이 그리기
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "blue" : "skyblue";
                ctx.fillRect(part.x, part.y, 18, 18);
            });

            setTimeout(drawGame, 150);
        }

        function gameOver() {
            isGameOver = true;
            
            // 화면에 GAME OVER 텍스트 그리기
            ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; // 반투명 검은 배경
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "white";
            ctx.font = "bold 40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
            
            ctx.font = "20px Arial";
            ctx.fillText("Press Space to Restart", canvas.width / 2, canvas.height / 2 + 40);

            startBtn.innerHTML = "다시 시작하기 (Space)";
            startBtn.style.display = 'block';
        }
    </script>
</body>
</html>
